<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Persona Research & Consulting - Sinonim Verbal</title>
    <style>
        :root {
            --midnight: #0a192f;
            --gold: #c5a059;
            --ivory: #fdfcf9;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
        }

        /* PROTOKOL KEAMANAN: Anti-AI/Anti-Copy */
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-user-select: none; user-select: none; }
        body { background-color: var(--ivory); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; }

        /* --- LOGIN --- */
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #112240 0%, #0a192f 100%); }
        .auth-card { background: var(--white); padding: 40px; border-radius: 16px; text-align: center; width: 100%; max-width: 450px; border-top: 10px solid var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .brand-full { font-size: 20px; font-weight: 800; color: var(--midnight); text-transform: uppercase; letter-spacing: 1px; }
        .brand-sub { font-size: 11px; letter-spacing: 3px; color: var(--gold); margin-bottom: 30px; font-weight: 600; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; -webkit-user-select: text; user-select: text; }
        .btn-gold { width: 100%; padding: 16px; background: var(--gold); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* --- HEADER --- */
        header { background: var(--midnight); padding: 15px 25px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; }
        .header-brand { font-weight: 700; font-size: 14px; }

        /* --- CONTENT --- */
        .container { max-width: 1200px; margin: 25px auto; display: flex; flex-wrap: wrap; gap: 20px; padding: 0 15px; }
        .quiz-box { flex: 1; min-width: 320px; background: var(--white); padding: 35px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .q-text { font-size: 22px; font-weight: 700; margin-bottom: 30px; color: var(--midnight); text-transform: uppercase; }

        .option { padding: 16px 20px; border: 1.5px solid var(--border); margin-bottom: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; }
        .opt-label { width: 30px; height: 30px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: 800; font-size: 12px; border: 1px solid var(--border); }
        .option.active { background: var(--midnight); color: var(--gold); border-color: var(--gold); }
        .option.active .opt-label { background: var(--gold); color: var(--midnight); }

        /* --- NAV GRID --- */
        .sidebar { width: 100%; max-width: 320px; }
        .nav-panel { background: var(--white); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .dot { height: 38px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); font-size: 11px; cursor: pointer; border-radius: 6px; font-weight: 700; }
        .dot.current { background: var(--gold); color: white; border: none; }
        .dot.filled { border-color: var(--midnight); background: #f1f5f9; color: var(--midnight); }

        /* --- RESULT PAGE --- */
        #page-res { display: none; background: var(--white); max-width: 800px; margin: 30px auto; padding: 50px 20px; text-align: center; border-radius: 20px; border: 1px solid var(--border); }
        .score-box { background: #f8fafc; padding: 40px; border-radius: 20px; margin-bottom: 30px; display: inline-block; min-width: 300px; border: 1px solid var(--border); }
        .score-big { font-size: 100px; font-weight: 900; color: var(--midnight); line-height: 1; margin: 0; }
        .pembahasan-card { text-align: left; background: #f8fafc; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--midnight); border-radius: 8px; font-size: 14px; }

        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { max-width: 100%; } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return (event.keyCode != 123)">

<div id="view-auth" class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-full">Persona Research & Consulting</div>
        <div class="brand-sub">Verbal Synonym Assessment</div>
        <input type="text" id="userName" placeholder="NAMA LENGKAP">
        <button class="btn-gold" onclick="startTest()">MULAI TES</button>
    </div>
</div>

<div id="view-test" style="display:none;">
    <header>
        <div class="header-brand">PERSONA RESEARCH & CONSULTING</div>
        <div id="timer" style="font-size: 22px; font-weight: 800; color: var(--gold);">20:00</div>
    </header>
    <div class="container">
        <div class="quiz-box">
            <div id="q-label" style="color:var(--gold); font-size:11px; font-weight:800; margin-bottom:10px; letter-spacing: 1px;"></div>
            <div id="q-body" class="q-text"></div>
            <div id="q-options"></div>
        </div>
        <div class="sidebar">
            <div class="nav-panel">
                <p style="font-size: 10px; font-weight: 800; margin-bottom: 15px;">NAVIGASI ITEM (1-50)</p>
                <div id="nav-dots" class="grid-50"></div>
                <button class="btn-gold no-print" style="margin-top: 25px; background: var(--midnight);" onclick="finalize()">SUBMIT SEKARANG</button>
            </div>
        </div>
    </div>
</div>

<div id="page-res">
    <div class="brand-full">Persona Research & Consulting</div>
    <div class="brand-sub">Official Result Certificate</div>
    <div class="score-box">
        <span class="score-big" id="final-score">0</span><span style="font-size:30px; color:var(--gold); font-weight:600;">/100</span>
    </div>
    <p id="res-name" style="font-size: 24px; font-weight: 800; color: var(--midnight); text-transform: uppercase; margin-bottom: 40px;"></p>
    <div id="discussion-list" style="text-align: left;"></div>
    <button class="btn-gold no-print" style="width: 250px; margin-top: 30px;" onclick="window.print()">CETAK HASIL (PDF)</button>
</div>

<script>
    let currentIdx = 0, userSelections = {}, questions = [];
    const labels = ['A', 'B', 'C', 'D', 'E'];

    const pool = [
        { q: "EVOKASI = ...", a: "Penggugah rasa", o: ["Penilaian", "Perubahan", "Pengungsian", "Izin menetap"], r: "Evokasi adalah (daya) penggugah rasa." },
        { q: "BAKU = ...", a: "Standar", o: ["Umum", "Normal", "Asli", "Pokok"], r: "Baku berarti tolok ukur atau standar." },
        { q: "ITERASI = ...", a: "Perulangan", o: ["Hubungan", "Substitusi", "Interaksi", "Peredaran"], r: "Iterasi adalah perulangan." },
        { q: "PROMOTOR = ...", a: "Penggerak", o: ["Penghubung", "Penyokong", "Pemakai", "Pemberi"], r: "Promotor adalah orang yang menjadi penggerak atau penganjur." },
        { q: "AGITASI = ...", a: "Hasutan", o: ["Ancaman", "Ajakan", "Tekanan", "Pemberitaan"], r: "Agitasi berarti hasutan atau upaya untuk menggerakkan massa." },
        { q: "TANDEM = ...", a: "Bersamaan", o: ["Berurutan", "Bergantian", "Berpasangan", "Berlawanan"], r: "Tandem berarti dilakukan secara bersama-sama atau berpasangan." },
        { q: "RESIDU = ...", a: "Sisa", o: ["Hasil", "Penyaringan", "Ampas", "Bagian"], r: "Residu adalah ampas atau sisa." },
        { q: "ADAPTASI = ...", a: "Penyesuaian", o: ["Penggabungan", "Perubahan", "Pemilihan", "Penerimaan"], r: "Adaptasi adalah proses penyesuaian diri." },
        { q: "KOLUSI = ...", a: "Kongkalikong", o: ["Korupsi", "Kerjasama", "Kesepakatan", "Koneksi"], r: "Kolusi adalah kerjasama rahasia untuk maksud tidak terpuji (kongkalikong)." },
        { q: "KONVENSI = ...", a: "Kesepakatan", o: ["Rapat", "Peraturan", "Kebiasaan", "Pertemuan"], r: "Konvensi adalah mufakat atau kesepakatan umum." },
        { q: "INSINUASI = ...", a: "Sindiran", o: ["Hinaan", "Tuduhan", "Harapan", "Kenyataan"], r: "Insinuasi adalah sindiran secara tidak langsung." },
        { q: "ABOLISI = ...", a: "Penghapusan", o: ["Pengampunan", "Pembatalan", "Pengurangan", "Pemindahan"], r: "Abolisi adalah penghapusan pidana." },
        { q: "DELEGASI = ...", a: "Utusan", o: ["Perwakilan", "Anggota", "Ketua", "Kelompok"], r: "Delegasi adalah utusan atau perwakilan." },
        { q: "ELABORASI = ...", a: "Penjelasan terperinci", o: ["Penyederhanaan", "Penggabungan", "Pengerjaan", "Pendalaman"], r: "Elaborasi adalah penggarapan secara tekun dan terperinci." },
        { q: "EKSEKUSI = ...", a: "Pelaksanaan", o: ["Hukuman", "Penindakan", "Permintaan", "Penilaian"], r: "Eksekusi adalah pelaksanaan keputusan atau perintah." },
        { q: "GANCU = ...", a: "Pengait", o: ["Parang", "Timbangan", "Karung", "Palu"], r: "Gancu adalah batang besi yang ujungnya berpengait." },
        { q: "IMPLIKASI = ...", a: "Akibat", o: ["Saran", "Maksud", "Harapan", "Tujuan"], r: "Implikasi adalah keterlibatan atau akibat langsung." },
        { q: "KONTRIBUSI = ...", a: "Sumbangan", o: ["Bantuan", "Dukungan", "Hadiah", "Pajak"], r: "Kontribusi adalah uang iuran atau sumbangan." },
        { q: "NARASI = ...", a: "Deskripsi", o: ["Cerita", "Proses", "Teks", "Dialog"], r: "Narasi adalah pengisahan atau deskripsi suatu kejadian." },
        { q: "OTODIDAK = ...", a: "Belajar sendiri", o: ["Ahli", "Guru", "Pintar", "Berbakat"], r: "Otodidak adalah orang yang belajar tanpa guru formal." },
        { q: "PRESTISE = ...", a: "Wibawa", o: ["Gaya", "Kekuatan", "Keunggulan", "Kekayaan"], r: "Prestise adalah martabat atau wibawa." },
        { q: "REKONSILIASI = ...", a: "Perdamaian", o: ["Perjanjian", "Pertemuan", "Penyatuan", "Pemulihan"], r: "Rekonsiliasi adalah perbuatan memulihkan hubungan persahabatan (perdamaian)." },
        { q: "SKEPTIS = ...", a: "Ragu-ragu", o: ["Curiga", "Yakin", "Takut", "Bingung"], r: "Skeptis berarti kurang percaya atau ragu-ragu." },
        { q: "TRANSFORMASI = ...", a: "Perubahan bentuk", o: ["Pemindahan", "Perputaran", "Perkembangan", "Penyebaran"], r: "Transformasi adalah perubahan rupa/bentuk." },
        { q: "URGEN = ...", a: "Mendesak", o: ["Penting", "Genting", "Cepat", "Darurat"], r: "Urgen berarti perlu segera ditindaklanjuti atau mendesak." },
        { q: "VIRTUAL = ...", a: "Maya", o: ["Nyata", "Imitasi", "Langsung", "Canggih"], r: "Virtual adalah secara nyata tapi tidak fisik (maya)." },
        { q: "WARTA = ...", a: "Berita", o: ["Majalah", "Koran", "Informasi", "Pesan"], r: "Warta berarti kabar atau berita." },
        { q: "ZENIT = ...", a: "Puncak", o: ["Dasar", "Langit", "Bintang", "Ruang"], r: "Zenit adalah titik di langit yang tepat di atas kepala (titik puncak)." },
        { q: "AKOMODASI = ...", a: "Penyesuaian", o: ["Penginapan", "Bantuan", "Perjalanan", "Fasilitas"], r: "Akomodasi adalah penyesuaian diri atau penyediaan tempat menginap." },
        { q: "BONAFIDE = ...", a: "Dapat dipercaya", o: ["Tebal", "Besar", "Mewah", "Sukses"], r: "Bonafide berarti jujur atau dapat dipercaya dengan baik." },
        { q: "CANGGIH = ...", a: "Modern", o: ["Rumit", "Mahal", "Unik", "Cepat"], r: "Canggih sering disinonimkan dengan modern atau kompleks." },
        { q: "DILEMA = ...", a: "Situasi sulit", o: ["Pilihan", "Masalah", "Kebingungan", "Keraguan"], r: "Dilema adalah situasi sulit yang mengharuskan orang memilih dua opsi." },
        { q: "EVAKUASI = ...", a: "Pengungsian", o: ["Penyelamatan", "Pemindahan", "Pencarian", "Penjagaan"], r: "Evakuasi adalah pengungsian atau pemindahan penduduk." },
        { q: "FENOMENA = ...", a: "Gejala", o: ["Kejadian", "Fakta", "Realita", "Berita"], r: "Fenomena adalah hal-hal yang dapat disaksikan (gejala)." },
        { q: "GENERIK = ...", a: "Umum", o: ["Murah", "Asli", "Khas", "Sama"], r: "Generik berarti umum atau lazim." },
        { q: "HIBRIDA = ...", a: "Cangkokan", o: ["Asli", "Unggul", "Keturunan", "Bibit"], r: "Hibrida adalah hasil perkawinan silang (cangkokan/campuran)." },
        { q: "IDENTIK = ...", a: "Sama benar", o: ["Mirip", "Kembar", "Serasi", "Dekat"], r: "Identik berarti sama benar atau tidak berbeda sedikit pun." },
        { q: "Jargon = ...", a: "Slogan", o: ["Bahasa", "Kata-kata", "Istilah", "Singkatan"], r: "Jargon adalah kosakata khusus atau slogan dalam bidang tertentu." },
        { q: "KLARIFIKASI = ...", a: "Penjelasan", o: ["Pembersihan", "Permintaan", "Pernyataan", "Pembenaran"], r: "Klarifikasi adalah penjernihan atau penjelasan." },
        { q: "LATEN = ...", a: "Tersembunyi", o: ["Bahaya", "Lama", "Nyata", "Muncul"], r: "Laten berarti tersembunyi atau tidak kelihatan tapi punya potensi." },
        { q: "MILITAN = ...", a: "Bersemangat tinggi", o: ["Keras kepala", "Tentara", "Berani", "Kaku"], r: "Militan berarti bersemangat tinggi atau penuh pengabdian." },
        { q: "NOMADEN = ...", a: "Berpindah-pindah", o: ["Menetap", "Warga", "Suku", "Asing"], r: "Nomaden adalah cara hidup berpindah-pindah tempat." },
        { q: "OPINI = ...", a: "Pendapat", o: ["Fakta", "Saran", "Kabar", "Berita"], r: "Opini adalah pendapat atau pikiran seseorang." },
        { q: "PARADOKS = ...", a: "Lawan asas", o: ["Kesamaan", "Pendapat", "Pertentangan", "Masalah"], r: "Paradoks adalah pernyataan yang seolah bertentangan dengan pendapat umum." },
        { q: "QUOTA = ...", a: "Jatah", o: ["Jumlah", "Batas", "Bagian", "Target"], r: "Quota adalah jatah atau jumlah yang ditentukan." },
        { q: "RELATIVITAS = ...", a: "Nisbi", o: ["Kesamaan", "Kaitan", "Ukuran", "Waktu"], r: "Relativitas berarti kenisbian." },
        { q: "STAGNAN = ...", a: "Mandek", o: ["Berhenti", "Lambat", "Tenang", "Stabil"], r: "Stagnan berarti dalam keadaan terhenti atau mandek." },
        { q: "TENDENSI = ...", a: "Kecenderungan", o: ["Maksud", "Tujuan", "Keinginan", "Harapan"], r: "Tendensi adalah kecenderungan atau kecondongan." },
        { q: "UTOPIA = ...", a: "Khayalan", o: ["Harapan", "Rencana", "Masa depan", "Cita-cita"], r: "Utopia adalah sistem sosial yang sempurna tapi hanya ada dalam khayalan." },
        { q: "VALID = ...", a: "Sah", o: ["Benar", "Kuat", "Nyata", "Pasti"], r: "Valid berarti menurut cara yang semestinya atau sah." }
    ];

    function startTest() {
        if(document.getElementById('userName').value.length > 2) {
            questions = pool.sort(() => Math.random() - 0.5).map(q => ({
                ...q, shuffled: [q.a, ...q.o].sort(() => Math.random() - 0.5)
            }));
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('view-test').style.display = 'block';
            render(); startTimer(1200);
        } else { alert("Masukkan Nama Lengkap."); }
    }

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `ITEM SINONIM ${currentIdx + 1} / 50`;
        document.getElementById('q-body').innerText = q.q;
        let h = "";
        q.shuffled.forEach((opt, i) => {
            h += `<div class="option ${userSelections[currentIdx] === opt ? 'active' : ''}" onclick="pick('${opt}')"><div class="opt-label">${labels[i]}</div>${opt}</div>`;
        });
        document.getElementById('q-options').innerHTML = h;
        updateGrid();
    }

    function pick(val) {
        userSelections[currentIdx] = val; render();
        setTimeout(() => { if(currentIdx < 49) { currentIdx++; render(); } }, 300);
    }

    function updateGrid() {
        let h = "";
        questions.forEach((_, i) => { h += `<div class="dot ${currentIdx === i ? 'current' : ''} ${userSelections[i] ? 'filled' : ''}" onclick="currentIdx=${i};render()">${i+1}</div>`; });
        document.getElementById('nav-dots').innerHTML = h;
    }

    function startTimer(sec) {
        const t = document.getElementById('timer');
        const inv = setInterval(() => {
            sec--; let m = Math.floor(sec/60), s = sec%60;
            t.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(sec <= 0) { clearInterval(inv); finalize(); }
        }, 1000);
    }

    function finalize() {
        if(!confirm('Kirim sekarang?')) return;
        document.getElementById('view-test').style.display = 'none';
        document.getElementById('page-res').style.display = 'block';
        let correct = 0, dHtml = "";
        questions.forEach((q, i) => {
            const isOk = userSelections[i] === q.a;
            if(isOk) correct++;
            dHtml += `<div class="pembahasan-card"><strong>${i+1}. ${q.q}</strong><br><span style="color:${isOk?'#059669':'#dc2626'}; font-weight:bold;">Jawaban: ${userSelections[i] || 'KOSONG'}</span> | Kunci: ${q.a}<br><p style="margin-top:5px; color:#64748b; font-style:italic;">Analisis: ${q.r}</p></div>`;
        });
        document.getElementById('final-score').innerText = Math.round((correct / 50) * 100);
        document.getElementById('res-name').innerText = document.getElementById('userName').value;
        document.getElementById('discussion-list').innerHTML = dHtml;
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
