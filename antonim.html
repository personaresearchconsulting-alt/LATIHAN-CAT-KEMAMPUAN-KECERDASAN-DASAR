<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Persona Research & Consulting - Verbal Antonim</title>
    <style>
        :root {
            --midnight: #0a192f;
            --gold: #c5a059;
            --ivory: #fdfcf9;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
        }

        /* PROTOKOL KEAMANAN: Anti-AI/Anti-Copy */
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-user-select: none; user-select: none; }
        body { background-color: var(--ivory); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; }

        /* --- LOGIN --- */
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #112240 0%, #0a192f 100%); }
        .auth-card { background: var(--white); padding: 40px; border-radius: 16px; text-align: center; width: 100%; max-width: 450px; border-top: 10px solid var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .brand-full { font-size: 20px; font-weight: 800; color: var(--midnight); text-transform: uppercase; letter-spacing: 1px; }
        .brand-sub { font-size: 11px; letter-spacing: 3px; color: var(--gold); margin-bottom: 30px; font-weight: 600; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; -webkit-user-select: text; user-select: text; }
        .btn-gold { width: 100%; padding: 16px; background: var(--gold); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* --- HEADER --- */
        header { background: var(--midnight); padding: 15px 25px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; }
        .header-brand { font-weight: 700; font-size: 14px; }

        /* --- CONTENT --- */
        .container { max-width: 1200px; margin: 25px auto; display: flex; flex-wrap: wrap; gap: 20px; padding: 0 15px; }
        .quiz-box { flex: 1; min-width: 320px; background: var(--white); padding: 35px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .q-text { font-size: 22px; font-weight: 700; margin-bottom: 30px; color: var(--midnight); text-transform: uppercase; }

        .option { padding: 16px 20px; border: 1.5px solid var(--border); margin-bottom: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; }
        .opt-label { width: 30px; height: 30px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: 800; font-size: 12px; border: 1px solid var(--border); }
        .option.active { background: var(--midnight); color: var(--gold); border-color: var(--gold); }
        .option.active .opt-label { background: var(--gold); color: var(--midnight); }

        /* --- NAV GRID --- */
        .sidebar { width: 100%; max-width: 320px; }
        .nav-panel { background: var(--white); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .dot { height: 38px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); font-size: 11px; cursor: pointer; border-radius: 6px; font-weight: 700; }
        .dot.current { background: var(--gold); color: white; border: none; }
        .dot.filled { border-color: var(--midnight); background: #f1f5f9; color: var(--midnight); }

        /* --- RESULT PAGE --- */
        #page-res { display: none; background: var(--white); max-width: 800px; margin: 30px auto; padding: 50px 20px; text-align: center; border-radius: 20px; border: 1px solid var(--border); }
        .score-box { background: #f8fafc; padding: 40px; border-radius: 20px; margin-bottom: 30px; display: inline-block; min-width: 300px; border: 1px solid var(--border); }
        .score-big { font-size: 100px; font-weight: 900; color: var(--midnight); line-height: 1; margin: 0; }
        .score-scale { font-size: 30px; color: var(--gold); font-weight: 600; }
        .score-detail { font-size: 18px; color: #64748b; margin-top: 15px; font-weight: 700; letter-spacing: 1px; }
        .pembahasan-card { text-align: left; background: #f8fafc; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--midnight); border-radius: 8px; font-size: 14px; }

        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { max-width: 100%; } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return (event.keyCode != 123)">

<div id="view-auth" class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-full">Persona Research & Consulting</div>
        <div class="brand-sub">Advanced Assessment System</div>
        <input type="text" id="userName" placeholder="NAMA LENGKAP">
        <button class="btn-gold" onclick="startTest()">MULAI TES</button>
        <p style="font-size: 10px; color: #64748b; margin-top: 20px;">WA Support: 0877 4251 5786</p>
    </div>
</div>

<div id="view-test" style="display:none;">
    <header>
        <div class="header-brand">PERSONA RESEARCH & CONSULTING</div>
        <div id="timer" style="font-size: 22px; font-weight: 800; color: var(--gold);">30:00</div>
    </header>
    <div class="container">
        <div class="quiz-box">
            <div id="q-label" style="color:var(--gold); font-size:11px; font-weight:800; margin-bottom:10px; letter-spacing: 1px;"></div>
            <div id="q-body" class="q-text"></div>
            <div id="q-options"></div>
        </div>
        <div class="sidebar">
            <div class="nav-panel">
                <p style="font-size: 10px; font-weight: 800; margin-bottom: 15px;">NAVIGASI ITEM (1-50)</p>
                <div id="nav-dots" class="grid-50"></div>
                <button class="btn-gold no-print" style="margin-top: 25px; background: var(--midnight);" onclick="if(confirm('Kirim jawaban sekarang?')) finalize()">SUBMIT SEKARANG</button>
            </div>
        </div>
    </div>
</div>

<div id="page-res">
    <div class="brand-full">Persona Research & Consulting</div>
    <div class="brand-sub">Official Result Certificate</div>
    
    <div class="score-box">
        <p style="font-size: 12px; font-weight: 800; color: var(--gold); margin-bottom: 10px; letter-spacing: 2px;">HASIL SKOR AKHIR</p>
        <span class="score-big" id="final-score">0</span>
        <span class="score-scale">/ 100</span>
        <div class="score-detail" id="score-raw">BENAR 0 DARI 50 SOAL</div>
    </div>

    <p id="res-name" style="font-size: 24px; font-weight: 800; color: var(--midnight); text-transform: uppercase; margin-bottom: 40px;"></p>
    
    <div id="discussion-area" style="text-align: left;">
        <h3 style="border-bottom: 2px solid var(--gold); padding-bottom: 10px; color: var(--midnight);">ANALISIS & PEMBAHASAN</h3>
        <div id="discussion-list"></div>
    </div>
    <button class="btn-gold no-print" style="width: 250px; margin-top: 30px;" onclick="window.print()">CETAK HASIL (PDF)</button>
</div>

<script>
    let currentIdx = 0;
    let userSelections = {};
    let questions = [];
    const labels = ['A', 'B', 'C', 'D', 'E'];

    const antonimPool = [
        { q: "PROGRESIF >< ...", a: "Statis", o: ["Aktif", "Maju", "Moderen", "Pesat"], r: "Progresif berarti bergerak maju; lawannya adalah Statis (diam)." },
        { q: "AMATIR >< ...", a: "Profesional", o: ["Ahli", "Kampiun", "Master", "Pemenang"], r: "Amatir berdasar hobi; Profesional berdasar keahlian." },
        { q: "DINAMIS >< ...", a: "Pasif", o: ["Lambat", "Tenang", "Kaku", "Diam"], r: "Dinamis berarti penuh gerak; lawannya Pasif." },
        { q: "EFIMER >< ...", a: "Abadi", o: ["Fana", "Singkat", "Semu", "Fana"], r: "Efimer berarti sementara; lawannya Abadi." },
        { q: "KHAS >< ...", a: "Umum", o: ["Unik", "Spesifik", "Istimewa", "Eksklusif"], r: "Khas berarti khusus; lawannya Umum." },
        { q: "OTORITER >< ...", a: "Demokratis", o: ["Liberal", "Bebas", "Adil", "Lembut"], r: "Otoriter kekuasaan tunggal; lawannya Demokratis." },
        { q: "KONVERGEN >< ...", a: "Divergen", o: ["Memusat", "Fokus", "Sama", "Satu Titik"], r: "Konvergen berarti memusat; Divergen berarti menyebar." },
        { q: "ELASTIS >< ...", a: "Kaku", o: ["Keras", "Lentur", "Lunak", "Padat"], r: "Elastis berarti lentur; lawannya Kaku." },
        { q: "EKSTRINSIK >< ...", a: "Intrinsik", o: ["Internal", "Dalam", "Asing", "Utama"], r: "Ekstrinsik dari luar; Intrinsik dari dalam." },
        { q: "NOMADEN >< ...", a: "Menetap", o: ["Domisili", "Warga", "Tetap", "Singgah"], r: "Nomaden berpindah-pindah; lawannya Menetap." },
        { q: "SKEPTIS >< ...", a: "Yakin", o: ["Percaya", "Ragu", "Curiga", "Optimis"], r: "Skeptis berarti ragu; lawannya Yakin." },
        { q: "ARTIFISIAL >< ...", a: "Alami", o: ["Asli", "Murni", "Nyata", "Fisik"], r: "Artifisial adalah buatan; lawannya Alami." },
        { q: "MODERAT >< ...", a: "Ekstrim", o: ["Radikal", "Keras", "Berlebihan", "Frontal"], r: "Moderat di tengah; lawannya Ekstrim." },
        { q: "PERIFER >< ...", a: "Sentral", o: ["Pusat", "Inti", "Tengah", "Utama"], r: "Perifer pinggiran; lawannya Sentral." },
        { q: "KOLEKTIF >< ...", a: "Individual", o: ["Sendiri", "Terpisah", "Privat", "Mandiri"], r: "Kolektif bersama; lawannya Individual." },
        { q: "APATIS >< ...", a: "Peduli", o: ["Aktif", "Empati", "Perhatian", "Simpati"], r: "Apatis masa bodoh; lawannya Peduli." },
        { q: "PASIF >< ...", a: "Agresif", o: ["Aktif", "Giat", "Berani", "Cepat"], r: "Pasif diam; lawannya Agresif." },
        { q: "PROTAGONIS >< ...", a: "Antagonis", o: ["Lawan", "Musuh", "Jahat", "Oposisi"], r: "Protagonis tokoh utama; lawannya Antagonis." },
        { q: "ABSTRAK >< ...", a: "Konkrit", o: ["Nyata", "Jelas", "Fisik", "Padat"], r: "Abstrak tidak berwujud; lawannya Konkrit." },
        { q: "OPTIMIS >< ...", a: "Pesimis", o: ["Ragu", "Takut", "Sedih", "Kecewa"], r: "Optimis berpengharapan baik; lawannya Pesimis." },
        { q: "AKTUAL >< ...", a: "Kadaluwarsa", o: ["Lama", "Basi", "Fiktif", "Palsu"], r: "Aktual baru terjadi; lawannya Kadaluwarsa." },
        { q: "ANTIPATI >< ...", a: "Simpati", o: ["Empati", "Cinta", "Setuju", "Suka"], r: "Antipati rasa tidak suka; lawannya Simpati." },
        { q: "ASLI >< ...", a: "Duplikat", o: ["Palsu", "Tiruan", "Imitasi", "Semu"], r: "Asli lawan katanya Duplikat." },
        { q: "BERHASIL >< ...", a: "Gagal", o: ["Kalah", "Jatuh", "Menyerah", "Sia-sia"], r: "Lawan kata Berhasil adalah Gagal." },
        { q: "BONGSOR >< ...", a: "Kerdil", o: ["Kecil", "Pendek", "Mungil", "Kurang"], r: "Bongsor besar sekali; lawannya Kerdil." },
        { q: "CHAOS >< ...", a: "Normal", o: ["Teratur", "Rapi", "Tenang", "Damai"], r: "Chaos kacau balau; lawannya Normal." },
        { q: "CURAM >< ...", a: "Landai", o: ["Datar", "Rata", "Tumpul", "Bawah"], r: "Curam terjal; lawannya Landai." },
        { q: "DEDUKSI >< ...", a: "Induksi", o: ["Reduksi", "Konklusi", "Logika", "Analisis"], r: "Deduksi (umum ke khusus) lawannya Induksi." },
        { q: "DESTRUKTIF >< ...", a: "Konstruktif", o: ["Kreatif", "Positif", "Aktif", "Membangun"], r: "Destruktif merusak; Konstruktif membangun." },
        { q: "EKSPRESI >< ...", a: "Impresi", o: ["Depresi", "Kompresi", "Represi", "Supresi"], r: "Ekspresi lawannya Impresi." },
        { q: "FISIK >< ...", a: "Mental", o: ["Psikis", "Jiwa", "Rohani", "Batin"], r: "Fisik (tubuh) lawannya Mental." },
        { q: "FIKSI >< ...", a: "Nonfiksi", o: ["Nyata", "Fakta", "Realita", "Ilmiah"], r: "Fiksi (rekaan) lawannya Nonfiksi." },
        { q: "GERSANG >< ...", a: "Subur", o: ["Lebat", "Hijau", "Basah", "Rindang"], r: "Gersang kering; lawannya Subur." },
        { q: "GRATIS >< ...", a: "Bayar", o: ["Mahal", "Beli", "Sewa", "Utang"], r: "Gratis lawannya Bayar." },
        { q: "HARMONI >< ...", a: "Sumbang", o: ["Kacau", "Ribut", "Beda", "Pisah"], r: "Harmoni selaras; lawannya Sumbang." },
        { q: "HETEROGEN >< ...", a: "Homogen", o: ["Seragam", "Sama", "Satu", "Padu"], r: "Heterogen lawannya Homogen." },
        { q: "INSOMNIA >< ...", a: "Lelap", o: ["Tidur", "Mimpi", "Sadar", "Bangun"], r: "Insomnia tidak bisa tidur; lawannya Lelap." },
        { q: "JAWAB >< ...", a: "Tanya", o: ["Soal", "Urai", "Bahas", "Minta"], r: "Lawan kata Jawab adalah Tanya." },
        { q: "KAPABEL >< ...", a: "Bodoh", o: ["Lemah", "Lambat", "Gagal", "Cacat"], r: "Kapabel cakap; lawannya Bodoh." },
        { q: "KAWAL >< ...", a: "Biarkan", o: ["Lepas", "Usir", "Jauh", "Abaikan"], r: "Kawal menjaga; lawannya Biarkan." },
        { q: "KONTAN >< ...", a: "Hutang", o: ["Cicil", "Kredit", "Nanti", "Tempo"], r: "Kontan lawannya Hutang." },
        { q: "KRUSIAL >< ...", a: "Sepele", o: ["Kecil", "Biasa", "Remeh", "Mudah"], r: "Krusial sangat penting; lawannya Sepele." },
        { q: "LABIL >< ...", a: "Stabil", o: ["Kuat", "Tetap", "Teguh", "Kokoh"], r: "Labil goyah; lawannya Stabil." },
        { q: "LONGGAR >< ...", a: "Sempit", o: ["Ketat", "Sesak", "Padat", "Kecil"], r: "Longgar lawannya Sempit." },
        { q: "MAKAR >< ...", a: "Setia", o: ["Jujur", "Patuh", "Tunduk", "Baik"], r: "Makar khianat; lawannya Setia." },
        { q: "MAYOR >< ...", a: "Minor", o: ["Kecil", "Sedikit", "Bawah", "Rendah"], r: "Mayor utama; lawannya Minor." },
        { q: "MONOTON >< ...", a: "Berubah-ubah", o: ["Ramai", "Seru", "Banyak", "Cepat"], r: "Monoton itu-itu saja; lawannya Berubah." },
        { q: "NISBI >< ...", a: "Mutlak", o: ["Pasti", "Nyata", "Tetap", "Jelas"], r: "Nisbi relatif; lawannya Mutlak." },
        { q: "PERINTIS >< ...", a: "Pewaris", o: ["Penerus", "Pengikut", "Murid", "Pembawa"], r: "Perintis pembuka jalan; lawannya Pewaris." },
        { q: "SEKULER >< ...", a: "Keagamaan", o: ["Suci", "Duniawi", "Tradisi", "Kuno"], r: "Sekuler duniawi; lawannya Keagamaan." }
    ];

    function startTest() {
        if(document.getElementById('userName').value.length > 2) {
            questions = antonimPool.map(q => ({ ...q, shuffled: [q.a, ...q.o].sort(() => Math.random() - 0.5) }));
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('view-test').style.display = 'block';
            render(); startTimer(1800);
        } else { alert("Silakan masukkan Nama Lengkap Anda."); }
    }

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `ITEM ASESMEN ${currentIdx + 1} / 50`;
        document.getElementById('q-body').innerText = q.q;
        let h = "";
        q.shuffled.forEach((opt, i) => {
            h += `<div class="option ${userSelections[currentIdx] === opt ? 'active' : ''}" onclick="pick('${opt}')"><div class="opt-label">${labels[i]}</div>${opt}</div>`;
        });
        document.getElementById('q-options').innerHTML = h;
        updateGrid();
    }

    function pick(val) {
        userSelections[currentIdx] = val; render();
        setTimeout(() => { if(currentIdx < 49) { currentIdx++; render(); } }, 300);
    }

    function updateGrid() {
        let h = "";
        questions.forEach((_, i) => { h += `<div class="dot ${currentIdx === i ? 'current' : ''} ${userSelections[i] ? 'filled' : ''}" onclick="currentIdx=${i};render()">${i+1}</div>`; });
        document.getElementById('nav-dots').innerHTML = h;
    }

    function startTimer(sec) {
        const t = document.getElementById('timer');
        const inv = setInterval(() => {
            sec--; let m = Math.floor(sec/60), s = sec%60;
            t.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(sec <= 0) { clearInterval(inv); finalize(); }
        }, 1000);
    }

    function finalize() {
        document.getElementById('view-test').style.display = 'none';
        document.getElementById('page-res').style.display = 'block';
        let correctCount = 0;
        let dHtml = "";
        questions.forEach((q, i) => {
            const isOk = userSelections[i] === q.a;
            if(isOk) correctCount++;
            dHtml += `<div class="pembahasan-card"><strong>${i+1}. ${q.q}</strong><br><span style="color:${isOk?'#059669':'#dc2626'}; font-weight:bold;">Jawaban: ${userSelections[i] || 'KOSONG'}</span> | Kunci: ${q.a}<br><p style="margin-top:5px; color:#64748b; font-style:italic;">Analisis: ${q.r}</p></div>`;
        });
        
        const finalScore = Math.round((correctCount / 50) * 100);
        document.getElementById('final-score').innerText = finalScore;
        document.getElementById('score-raw').innerText = `BENAR ${correctCount} DARI 50 SOAL`;
        document.getElementById('res-name').innerText = document.getElementById('userName').value;
        document.getElementById('discussion-list').innerHTML = dHtml;
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
