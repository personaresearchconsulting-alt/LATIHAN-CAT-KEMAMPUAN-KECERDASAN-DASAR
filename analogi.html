<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Persona Research & Consulting - Analogi Verbal</title>
    <style>
        :root {
            --midnight: #0a192f;
            --gold: #c5a059;
            --ivory: #fdfcf9;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
        }

        /* PROTOKOL KEAMANAN: Anti-Selection */
        * { 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }
        
        body { background-color: var(--ivory); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; }

        /* --- LOGIN --- */
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #112240 0%, #0a192f 100%); }
        .auth-card { background: var(--white); padding: 40px; border-radius: 16px; text-align: center; width: 100%; max-width: 450px; border-top: 10px solid var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .brand-full { font-size: 20px; font-weight: 800; color: var(--midnight); text-transform: uppercase; letter-spacing: 1px; }
        .brand-sub { font-size: 11px; letter-spacing: 3px; color: var(--gold); margin-bottom: 30px; font-weight: 600; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; -webkit-user-select: text; user-select: text; }
        .btn-gold { width: 100%; padding: 16px; background: var(--gold); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* --- HEADER --- */
        header { background: var(--midnight); padding: 15px 25px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; }
        
        /* --- LAYOUT --- */
        .container { max-width: 1200px; margin: 25px auto; display: flex; flex-wrap: wrap; gap: 20px; padding: 0 15px; }
        .quiz-box { flex: 1; min-width: 320px; background: var(--white); padding: 35px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .q-text { font-size: 22px; font-weight: 700; margin-bottom: 30px; color: var(--midnight); text-transform: uppercase; line-height: 1.4; }

        .option { padding: 16px 20px; border: 1.5px solid var(--border); margin-bottom: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; font-weight: 500; }
        .opt-label { width: 30px; height: 30px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: 800; font-size: 12px; border: 1px solid var(--border); }
        .option.active { background: var(--midnight); color: var(--gold); border-color: var(--gold); }
        .option.active .opt-label { background: var(--gold); color: var(--midnight); }

        /* --- NAV GRID --- */
        .sidebar { width: 100%; max-width: 320px; }
        .nav-panel { background: var(--white); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .grid-50 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .dot { height: 38px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); font-size: 11px; cursor: pointer; border-radius: 6px; font-weight: 700; }
        .dot.current { background: var(--gold); color: white; border: none; }
        .dot.filled { border-color: var(--midnight); background: #f1f5f9; color: var(--midnight); }

        /* --- RESULT --- */
        #page-res { display: none; background: var(--white); max-width: 850px; margin: 30px auto; padding: 50px 20px; text-align: center; border-radius: 20px; border: 1px solid var(--border); }
        .score-box { background: #f8fafc; padding: 40px; border-radius: 20px; margin-bottom: 30px; display: inline-block; min-width: 350px; border: 1px solid var(--border); }
        .score-big { font-size: 110px; font-weight: 900; color: var(--midnight); line-height: 1; margin: 0; }
        .score-scale { font-size: 30px; color: var(--gold); font-weight: 600; }
        .score-detail { font-size: 18px; color: #64748b; margin-top: 15px; font-weight: 700; letter-spacing: 1px; }
        .pembahasan-card { text-align: left; background: #f8fafc; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--midnight); border-radius: 8px; font-size: 14px; }

        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { max-width: 100%; } }
        @media print { .no-print { display: none; } #page-res { border: none; } }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return (event.keyCode != 123)">

<div id="view-auth" class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-full">Persona Research & Consulting</div>
        <div class="brand-sub">Logical Analogy Assessment</div>
        <input type="text" id="userName" placeholder="NAMA LENGKAP">
        <button class="btn-gold" onclick="startTest()">MULAI TES</button>
    </div>
</div>

<div id="view-test" style="display:none;">
    <header>
        <div class="header-brand">PERSONA RESEARCH & CONSULTING</div>
        <div id="timer" style="font-size: 24px; font-weight: 800; color: var(--gold);">30:00</div>
    </header>
    <div class="container">
        <div class="quiz-box">
            <div id="q-label" style="color:var(--gold); font-size:11px; font-weight:800; margin-bottom:10px; letter-spacing: 2px;"></div>
            <div id="q-body" class="q-text"></div>
            <div id="q-options"></div>
        </div>
        <div class="sidebar">
            <div class="nav-panel">
                <p style="font-size: 10px; font-weight: 800; margin-bottom: 15px;">PROGRESS ANALOGI</p>
                <div id="nav-dots" class="grid-50"></div>
                <button class="btn-gold no-print" style="margin-top: 25px; background: var(--midnight);" onclick="if(confirm('Kirim jawaban?')) finalize()">SUBMIT SELESAI</button>
            </div>
        </div>
    </div>
</div>

<div id="page-res">
    <div class="brand-full">Persona Research & Consulting</div>
    <div class="brand-sub">Analogy Logic Result</div>
    
    <div class="score-box">
        <p style="font-size: 12px; font-weight: 800; color: var(--gold); margin-bottom: 10px; letter-spacing: 2px;">SKOR AKHIR</p>
        <span class="score-big" id="final-score">0</span>
        <span class="score-scale">/ 100</span>
        <div class="score-detail" id="score-raw">BENAR 0 DARI 50 SOAL</div>
    </div>

    <p id="res-name" style="font-size: 26px; font-weight: 800; color: var(--midnight); text-transform: uppercase; margin-bottom: 40px; border-bottom: 2px solid var(--gold); display: inline-block;"></p>
    
    <div id="discussion-area" style="text-align: left; padding: 0 20px;">
        <h3 style="color: var(--midnight); border-left: 4px solid var(--gold); padding-left: 15px;">ANALISIS LOGIKA JAWABAN</h3>
        <div id="discussion-list"></div>
    </div>
    <button class="btn-gold no-print" style="width: 250px; margin-top: 30px;" onclick="window.print()">SIMPAN HASIL (PDF)</button>
</div>

<script>
    let currentIdx = 0;
    let userSelections = {};
    let questions = [];
    const labels = ['A', 'B', 'C', 'D', 'E'];

    const pool = [
        { q: "GIGI : KUNYAH = JARI : ...", a: "Pegang", o: ["Kuku", "Tangan", "Manis", "Lari"], r: "Gigi berfungsi mengunyah, jari berfungsi memegang." },
        { q: "KANCIL : CERDIK = SERIGALA : ...", a: "Licik", o: ["Buas", "Hutan", "Anjing", "Takut"], r: "Sifat kancil identik dengan cerdik, serigala dengan licik." },
        { q: "MELATI : BUNGA = EMAS : ...", a: "Logam", o: ["Kuning", "Perhiasan", "Tambang", "Mahal"], r: "Melati jenis bunga, emas jenis logam." },
        { q: "LAPAR : MAKAN = HAUS : ...", a: "Minum", o: ["Air", "Botol", "Segar", "Kenyang"], r: "Lapar diatasi dengan makan, haus dengan minum." },
        { q: "PETANI : CANGKUL = PENJAHIT : ...", a: "Jarum", o: ["Kain", "Mesin", "Benang", "Baju"], r: "Alat utama petani cangkul, penjahit jarum." },
        { q: "MATA : MELIHAT = TELINGA : ...", a: "Mendengar", o: ["Suara", "Nada", "Tuli", "Bicara"], r: "Mata untuk melihat, telinga untuk mendengar." },
        { q: "GURU : SEKOLAH = DOKTER : ...", a: "Rumah Sakit", o: ["Pasien", "Obat", "Suster", "Klinik"], r: "Guru bekerja di sekolah, dokter di rumah sakit." },
        { q: "HUJAN : BANJIR = KEMARAU : ...", a: "Kekeringan", o: ["Panas", "Debu", "Matahari", "Haus"], r: "Sebab hujan banjir, sebab kemarau kekeringan." },
        { q: "ES : DINGIN = GULA : ...", a: "Manis", o: ["Putih", "Semut", "Kopi", "Air"], r: "Sifat es dingin, sifat gula manis." },
        { q: "KAYU : MEBEL = BENANG : ...", a: "Kain", o: ["Jahit", "Baju", "Kapas", "Tenun"], r: "Kayu bahan baku mebel, benang bahan baku kain." },
        { q: "KOMPAS : ARAH = JAM : ...", a: "Waktu", o: ["Detik", "Menit", "Angka", "Tangan"], r: "Kompas penunjuk arah, jam penunjuk waktu." },
        { q: "PESAWAT : PILOT = KAPAL : ...", a: "Nakhoda", o: ["Masinis", "Sopir", "Laut", "Pelabuhan"], r: "Pesawat dikemudikan pilot, kapal oleh nakhoda." },
        { q: "KORAN : BERITA = KAMUS : ...", a: "Definisi", o: ["Kata", "Buku", "Tulisan", "Bahasa"], r: "Koran sumber berita, kamus sumber definisi." },
        { q: "DOKTER : PASIEN = PEDAGANG : ...", a: "Pembeli", o: ["Pasar", "Barang", "Uang", "Toko"], r: "Dokter melayani pasien, pedagang melayani pembeli." },
        { q: "BUMI : BULAN = MATAHARI : ...", a: "Bumi", o: ["Bintang", "Planet", "Langit", "Panas"], r: "Bulan kelilingi bumi, bumi kelilingi matahari." },
        { q: "KULIT : RABA = HIDUNG : ...", a: "Cium", o: ["Napas", "Bau", "Wangi", "Udara"], r: "Kulit untuk meraba, hidung untuk mencium." },
        { q: "TUKANG : GERGAJI = PENULIS : ...", a: "Pena", o: ["Buku", "Kertas", "Ide", "Tinta"], r: "Alat kerja tukang gergaji, penulis pena." },
        { q: "KERTAS : TULIS = LANTAI : ...", a: "Sapu", o: ["Bersih", "Ubin", "Debu", "Rumah"], r: "Kertas median tulis, lantai median sapu." },
        { q: "TELUR : AYAM = BIJI : ...", a: "Pohon", o: ["Buah", "Tanah", "Akar", "Daun"], r: "Telur cikal bakal ayam, biji cikal bakal pohon." },
        { q: "AKTOR : FILM = PENYANYI : ...", a: "Konser", o: ["Lagu", "Musik", "Suara", "Panggung"], r: "Aktor di film, penyanyi di konser." },
        { q: "KAKI : JALAN = SAYAP : ...", a: "Terbang", o: ["Burung", "Udara", "Langit", "Bulu"], r: "Kaki untuk jalan, sayap untuk terbang." },
        { q: "SUTRA : ULAT = MADU : ...", a: "Lebah", o: ["Manis", "Bunga", "Hutan", "Botol"], r: "Sutra dari ulat, madu dari lebah." },
        { q: "KOTAK : KUBUS = LINGKARAN : ...", a: "Bola", o: ["Bulat", "Roda", "Garis", "Cincin"], r: "3D kotak adalah kubus, lingkaran adalah bola." },
        { q: "KAMERA : FOTO = STETOSKOP : ...", a: "Detak Jantung", o: ["Dokter", "Sakit", "Obat", "Pasien"], r: "Kamera tangkap foto, stetoskop detak jantung." },
        { q: "GUNTING : POTONG = PENA : ...", a: "Tulis", o: ["Kertas", "Tinta", "Buku", "Gambar"], r: "Gunting untuk potong, pena untuk tulis." },
        { q: "MOBIL : RODA = KAPAL : ...", a: "Baling-baling", o: ["Layar", "Air", "Pelabuhan", "Nakhoda"], r: "Penggerak mobil roda, kapal baling-baling." },
        { q: "SIANG : MATAHARI = MALAM : ...", a: "Bulan", o: ["Bintang", "Gelap", "Lampu", "Tidur"], r: "Siang ada matahari, malam ada bulan." },
        { q: "RUMAH : ATAP = TUBUH : ...", a: "Rambut", o: ["Baju", "Kulit", "Kaki", "Tangan"], r: "Rumah dilindungi atap (atas), tubuh oleh rambut (atas)." },
        { q: "NASI : BERAS = MEJA : ...", a: "Kayu", o: ["Pohon", "Hutan", "Tukang", "Mebel"], r: "Nasi dari beras, meja dari kayu." },
        { q: "INDONESIA : JAKARTA = PERANCIS : ...", a: "Paris", o: ["Lyon", "Marseille", "London", "Eropa"], r: "Jakarta ibukota Indonesia, Paris ibukota Perancis." },
        { q: "TELESKOP : BINTANG = MIKROSKOP : ...", a: "Bakteri", o: ["Laboratorium", "Kecil", "Dokter", "Lensa"], r: "Teleskop lihat bintang, mikroskop lihat bakteri." },
        { q: "SINGA : RUSA = KUCING : ...", a: "Tikus", o: ["Anjing", "Ikan", "Rumah", "Bulu"], r: "Singa mangsa rusa, kucing mangsa tikus." },
        { q: "DINGIN : SELIMUT = LAPAR : ...", a: "Nasi", o: ["Minum", "Kenyang", "Meja", "Piring"], r: "Dingin perlu selimut, lapar perlu nasi." },
        { q: "KENDARAAN : BENSIN = MANUSIA : ...", a: "Makanan", o: ["Minuman", "Oksigen", "Darah", "Energi"], r: "Energi kendaraan bensin, manusia makanan." },
        { q: "PULPEN : TINTA = KOMPOR : ...", a: "Gas", o: ["Api", "Dapur", "Masak", "Wajan"], r: "Pulpen butuh tinta, kompor butuh gas." },
        { q: "LARI : LELAH = BELAJAR : ...", a: "Pintar", o: ["Buku", "Sekolah", "Ujian", "Guru"], r: "Lari buat lelah, belajar buat pintar." },
        { q: "SARUNG TANGAN : TANGAN = KAOS KAKI : ...", a: "Kaki", o: ["Sepatu", "Jari", "Lari", "Betis"], r: "Sarung tangan di tangan, kaos kaki di kaki." },
        { q: "BUNGA : TAMAN = MURID : ...", a: "Sekolah", o: ["Buku", "Guru", "Kelas", "Belajar"], r: "Bunga di taman, murid di sekolah." },
        { q: "PAGI : SARAPAN = MALAM : ...", a: "Makan Malam", o: ["Tidur", "Mimpi", "Gelap", "Bulan"], r: "Waktu pagi sarapan, malam makan malam." },
        { q: "SENAPAN : BERBURU = PERANGKAP : ...", a: "Menangkap", o: ["Hewan", "Hutan", "Umpan", "Jaring"], r: "Senapan untuk berburu, perangkap untuk menangkap." },
        { q: "GANDUM : ROTI = KAYU : ...", a: "Meja", o: ["Pohon", "Daun", "Hutan", "Tukang"], r: "Gandum bahan roti, kayu bahan meja." },
        { q: "KOMPUTER : LISTRIK = MANUSIA : ...", a: "Kalori", o: ["Napas", "Oksigen", "Air", "Tidur"], r: "Komputer butuh listrik, manusia butuh kalori." },
        { q: "AKSESORIS : CINCIN = PAKAIAN : ...", a: "Kemeja", o: ["Model", "Kain", "Mahal", "Toko"], r: "Cincin jenis aksesoris, kemeja jenis pakaian." },
        { q: "SAPI : RUMPUT = KUCING : ...", a: "Ikan", o: ["Susu", "Bulu", "Tikus", "Meong"], r: "Sapi makan rumput, kucing makan ikan/tikus." },
        { q: "KULIT : SISIK = ATAP : ...", a: "Genteng", o: ["Rumah", "Kayu", "Dinding", "Langit"], r: "Kulit tertutup sisik, atap tertutup genteng." },
        { q: "NEGARA : PRESIDEN = KELUARGA : ...", a: "Ayah", o: ["Ibu", "Anak", "Rumah", "Warga"], r: "Pemimpin negara presiden, keluarga ayah." },
        { q: "SUARA : RADIO = GAMBAR : ...", a: "Televisi", o: ["Film", "Kamera", "Foto", "Bioskop"], r: "Radio media suara, televisi media gambar." },
        { q: "HAUS : AIR = KENYANG : ...", a: "Makan", o: ["Nasi", "Penuh", "Puas", "Selesai"], r: "Haus karena butuh air, kenyang karena makan." },
        { q: "MATAHARI : TERIK = LAMPU : ...", a: "Silau", o: ["Cahaya", "Listrik", "Malam", "Panas"], r: "Matahari sebabkan terik, lampu sebabkan silau." },
        { q: "KEMUDI : MOBIL = STANG : ...", a: "Sepeda", o: ["Roda", "Rem", "Rantai", "Jalan"], r: "Kemudi mengarahkan mobil, stang mengarahkan sepeda." }
    ];

    function startTest() {
        // Logika verifikasi password dihapus, hanya cek nama
        if(document.getElementById('userName').value.length > 2) {
            questions = pool.sort(() => Math.random() - 0.5).map(q => ({
                ...q, shuffled: [q.a, ...q.o].sort(() => Math.random() - 0.5)
            }));
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('view-test').style.display = 'block';
            render(); startTimer(1800);
        } else { alert("Silakan masukkan nama lengkap Anda."); }
    }

    function render() {
        const q = questions[currentIdx];
        document.getElementById('q-label').innerText = `ITEM ANALOGI ${currentIdx + 1} / 50`;
        document.getElementById('q-body').innerText = q.q;
        let h = "";
        q.shuffled.forEach((opt, i) => {
            h += `<div class="option ${userSelections[currentIdx] === opt ? 'active' : ''}" onclick="pick('${opt}')"><div class="opt-label">${labels[i]}</div>${opt}</div>`;
        });
        document.getElementById('q-options').innerHTML = h;
        updateGrid();
    }

    function pick(val) {
        userSelections[currentIdx] = val; render();
        setTimeout(() => { if(currentIdx < 49) { currentIdx++; render(); } }, 250);
    }

    function updateGrid() {
        let h = "";
        questions.forEach((_, i) => { h += `<div class="dot ${currentIdx === i ? 'current' : ''} ${userSelections[i] ? 'filled' : ''}" onclick="currentIdx=${i};render()">${i+1}</div>`; });
        document.getElementById('nav-dots').innerHTML = h;
    }

    function startTimer(sec) {
        const t = document.getElementById('timer');
        const inv = setInterval(() => {
            sec--; let m = Math.floor(sec/60), s = sec%60;
            t.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(sec <= 0) { clearInterval(inv); finalize(); }
        }, 1000);
    }

    function finalize() {
        document.getElementById('view-test').style.display = 'none';
        document.getElementById('page-res').style.display = 'block';
        let correct = 0;
        let dHtml = "";
        questions.forEach((q, i) => {
            const isOk = userSelections[i] === q.a;
            if(isOk) correct++;
            dHtml += `<div class="pembahasan-card"><strong>${i+1}. ${q.q}</strong><br><span style="color:${isOk?'#059669':'#dc2626'}; font-weight:bold;">Jawaban: ${userSelections[i] || 'KOSONG'}</span> | Kunci: ${q.a}<br><p style="margin-top:5px; color:#64748b; font-style:italic;">Analisis Logika: ${q.r}</p></div>`;
        });
        
        const finalScore = Math.round((correct / 50) * 100);
        document.getElementById('final-score').innerText = finalScore;
        document.getElementById('score-raw').innerText = `HASIL ANALISIS: BENAR ${correct} DARI 50 SOAL`;
        document.getElementById('res-name').innerText = document.getElementById('userName').value;
        document.getElementById('discussion-list').innerHTML = dHtml;
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
